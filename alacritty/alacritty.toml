[colors.primary]
background = "0x000000"

[env]
TERM = "xterm-256color"

[font]
size = 14.0

[font.bold]
family = "Pragmasevka"
style = "Bold"

[font.italic]
family = "Pragmasevka"
style = "Italic"

[font.normal]
family = "Pragmasevka"
style = "Regular"

[window]
startup_mode = "Windowed"

[window.dimensions]
columns = 100
lines = 50
